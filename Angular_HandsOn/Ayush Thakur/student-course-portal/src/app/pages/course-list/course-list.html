<div>
    <h2>Courses List</h2>
    
    <div *ngIf="isLoading; else coursesTemplate">
        <p>Loading courses...</p>
    </div>

    <ng-template #coursesTemplate>
        <div *ngIf="courses.length > 0; else noCourses" class="course-list-grid">
            <app-course-card 
                *ngFor="let course of courses; trackBy: trackByCourseId" 
                [course]="course" 
                (enrollRequested)="onEnroll($event)"
                appHighlight="lightblue">
            </app-course-card>
        </div>
    </ng-template>

    <ng-template #noCourses>
        <p>No courses available.</p>
    </ng-template>

    <p *ngIf="selectedCourseId">Selected course ID: {{ selectedCourseId }}</p>
</div>
