<div>
    <h1>{{ portalName }}</h1>
    <h2>Welcome to the Student Course Portal</h2>
    <p>Manage your academic journey, browse courses, and track your progress all in one place.</p>
    
    <div class="stats-row">
        <div><strong>Courses Available:</strong> 12</div>
        <div><strong>Enrolled:</strong> 3</div>
        <div><strong>GPA:</strong> 3.8</div>
    </div>

    <div style="margin-top: 20px;">
        <button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
        <p *ngIf="message">{{ message }}</p>
    </div>

    <div style="margin-top: 20px;">
        <label>Search Courses: </label>
        <input [(ngModel)]="searchTerm">
        <p>Searching for: {{ searchTerm }}</p>
    </div>
</div>
