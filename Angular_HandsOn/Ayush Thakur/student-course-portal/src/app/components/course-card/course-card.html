<div class="course-card" [ngClass]="cardClasses" [ngStyle]="borderStyle">
    <h3>{{ course?.name }}</h3>
    <p>Code: {{ course?.code }}</p>
    <p>Credits: {{ course?.credits | creditLabel }}</p>
    
    <div [ngSwitch]="course?.gradeStatus">
        <span *ngSwitchCase="'passed'" class="badge badge-passed">Passed</span>
        <span *ngSwitchCase="'failed'" class="badge badge-failed">Failed</span>
        <span *ngSwitchCase="'pending'" class="badge badge-pending">Pending</span>
    </div>

    <div *ngIf="isExpanded" class="details-content">
        <p>ID: {{ course?.id }}</p>
        <p>Enrolled Status: {{ course?.enrolled ? 'Enrolled' : 'Not Enrolled' }}</p>
    </div>

    <div class="button-group">
        <button (click)="toggleDetails()">
            {{ isExpanded ? 'Hide Details' : 'Show Details' }}
        </button>
        <button (click)="enrollRequested.emit(course.id)">Enroll</button>
    </div>
</div>
